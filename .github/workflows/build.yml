name: Build Me2Leads APK & Web

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'

      - name: Generate platform files
        run: |
          flutter create --project-name me2leads --org com.debouana --platforms android,ios,web .
          flutter pub get
          dart pub run flutter_launcher_icons

      - name: Patch NormalTheme to MaterialComponents (required by flutter_stripe)
        run: |
          python3 << 'PYEOF'
          import re

          patches = {
              'android/app/src/main/res/values/styles.xml': (
                  r'(<style name="NormalTheme" parent=")[^"]*(")',
                  r'\1Theme.MaterialComponents.Light.NoActionBar\2',
              ),
              'android/app/src/main/res/values-night/styles.xml': (
                  r'(<style name="NormalTheme" parent=")[^"]*(")',
                  r'\1Theme.MaterialComponents.DayNight.NoActionBar\2',
              ),
          }
          for path, (pattern, replacement) in patches.items():
              with open(path, 'r') as f:
                  content = f.read()
              content = re.sub(pattern, replacement, content)
              with open(path, 'w') as f:
                  f.write(content)
              print(f'{path} patched')
          PYEOF

      - name: Patch MainActivity to extend FlutterFragmentActivity
        run: |
          python3 << 'PYEOF'
          path = 'android/app/src/main/kotlin/com/debouana/myleads/MainActivity.kt'
          content = (
              'package com.debouana.myleads\n\n'
              'import io.flutter.embedding.android.FlutterFragmentActivity\n\n'
              'class MainActivity : FlutterFragmentActivity()\n'
          )
          with open(path, 'w') as f:
              f.write(content)
          print('MainActivity.kt patched')
          PYEOF

      - name: Patch iOS app display name
        run: |
          python3 << 'PYEOF'
          import plistlib

          path = 'ios/Runner/Info.plist'
          with open(path, 'rb') as f:
              plist = plistlib.load(f)
          plist['CFBundleDisplayName'] = 'Me2Leads'
          plist['CFBundleName'] = 'Me2Leads'
          # Add Apple Pay merchant ID for Stripe payments
          plist['com.apple.developer.in-app-payments'] = ['merchant.com.debouana.myleads']
          with open(path, 'wb') as f:
              plistlib.dump(plist, f)
          print('ios/Runner/Info.plist patched')
          PYEOF

      - name: Patch iOS entitlements for Apple Pay
        run: |
          python3 << 'PYEOF'
          import plistlib
          import os

          entitlements_path = 'ios/Runner/Runner.entitlements'
          if not os.path.exists(entitlements_path):
              # Create entitlements file if it doesn't exist
              entitlements = {
                  'com.apple.developer.in-app-payments': ['merchant.com.debouana.myleads']
              }
              with open(entitlements_path, 'wb') as f:
                  plistlib.dump(entitlements, f)
              print('Runner.entitlements created')
          else:
              # Patch existing entitlements
              with open(entitlements_path, 'rb') as f:
                  entitlements = plistlib.load(f)
              entitlements['com.apple.developer.in-app-payments'] = ['merchant.com.debouana.myleads']
              with open(entitlements_path, 'wb') as f:
                  plistlib.dump(entitlements, f)
              print('Runner.entitlements patched')
          PYEOF

      - name: Add ProGuard rules for ML Kit
        run: |
          # Create ProGuard rules
          cat > android/app/proguard-rules.pro << 'EOF'
          -keep class com.google.mlkit.** { *; }
          -dontwarn com.google.mlkit.**
          -keep class com.google.android.gms.** { *; }
          -dontwarn com.google.android.gms.**
          -keep class io.flutter.plugins.** { *; }
          -keep class androidx.security.crypto.** { *; }
          -dontwarn androidx.security.crypto.**
          EOF

          # Patch build.gradle to use ProGuard rules in release
          python3 << 'PYEOF'
          with open('android/app/build.gradle', 'r') as f:
              content = f.read()
          old = 'signingConfig signingConfigs.debug'
          new = '''signingConfig signingConfigs.debug
                  minifyEnabled true
                  proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"'''
          content = content.replace(old, new, 1)
          with open('android/app/build.gradle', 'w') as f:
              f.write(content)
          PYEOF

      - name: Patch AndroidManifest with intent queries
        run: |
          # url_launcher needs <queries> declaration on Android 11+
          # Also need INTERNET for sign-in flows
          python3 << 'PYEOF'
          import re

          path = 'android/app/src/main/AndroidManifest.xml'
          with open(path, 'r') as f:
              content = f.read()

          # Change app display label (flutter create defaults to package name)
          content = re.sub(r'android:label="(?:me2leads|myleads|@string/app_name)"', 'android:label="Me2Leads"', content)

          # singleTask is required for Stripe PaymentSheet redirect flows (Link,
          # Amazon Pay, bank redirects). With singleTop, the Chrome Custom Tab
          # sits on top of the task so the redirect intent creates a NEW
          # MainActivity instance instead of calling onNewIntent on the existing
          # one — the second Flutter engine start crashes the app.
          content = content.replace(
              'android:launchMode="singleTop"',
              'android:launchMode="singleTask"',
          )

          # Add INTERNET permission (idempotent)
          if 'android.permission.INTERNET' not in content:
              content = re.sub(
                  r'(<manifest[^>]*>)',
                  r'\1\n    <uses-permission android:name="android.permission.INTERNET"/>',
                  content,
                  count=1,
              )

          # POST_NOTIFICATIONS — required on Android 13+ for push notifications
          if 'android.permission.POST_NOTIFICATIONS' not in content:
              content = re.sub(
                  r'(<manifest[^>]*>)',
                  r'\1\n    <uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>',
                  content,
                  count=1,
              )

          # RECEIVE_BOOT_COMPLETED — lets flutter_local_notifications re-register
          # scheduled alarms after a device reboot
          if 'android.permission.RECEIVE_BOOT_COMPLETED' not in content:
              content = re.sub(
                  r'(<manifest[^>]*>)',
                  r'\1\n    <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED"/>',
                  content,
                  count=1,
              )

          # WAKE_LOCK — required by WorkManager to run background tasks
          if 'android.permission.WAKE_LOCK' not in content:
              content = re.sub(
                  r'(<manifest[^>]*>)',
                  r'\1\n    <uses-permission android:name="android.permission.WAKE_LOCK"/>',
                  content,
                  count=1,
              )

          # Merge additional intents into the existing <queries> block that
          # flutter create always generates. The old guard
          # `if '<queries>' not in content` was always False, so these
          # intents were never injected into CI-built APKs.
          extra_intents = """
                  <intent>
                      <action android:name="android.intent.action.VIEW" />
                      <data android:scheme="tel" />
                  </intent>
                  <intent>
                      <action android:name="android.intent.action.SENDTO" />
                      <data android:scheme="sms" />
                  </intent>
                  <intent>
                      <action android:name="android.intent.action.SENDTO" />
                      <data android:scheme="mailto" />
                  </intent>
                  <intent>
                      <action android:name="android.intent.action.VIEW" />
                      <data android:scheme="https" />
                  </intent>
                  <intent>
                      <action android:name="android.intent.action.VIEW" />
                      <data android:scheme="http" />
                  </intent>
                  <!-- Chrome Custom Tabs — required for Stripe PaymentSheet redirect
                       flows (Link, Amazon Pay). Without this, CustomTabsClient
                       .getPackageName() returns null on Android 11+ and the SDK
                       falls back to a plain Intent.ACTION_VIEW that has no return
                       path, causing an ActivityNotFoundException crash. -->
                  <intent>
                      <action android:name="android.support.customtabs.action.CustomTabsService" />
                  </intent>"""
          if 'android:scheme="https"' not in content:
              # No <queries> block at all — insert a full one before </manifest>
              content = content.replace(
                  '</manifest>',
                  '<queries>' + extra_intents + '\n          </queries>\n      </manifest>',
                  1,
              )
          else:
              # flutter create already generated a <queries> block; append our
              # intents just before the closing </queries> tag.
              if 'android.support.customtabs.action.CustomTabsService' not in content:
                  content = content.replace(
                      '</queries>',
                      extra_intents + '\n          </queries>',
                      1,
                  )

          # Inject Stripe deep-link intent-filter inside MainActivity so that
          # me2leads://stripe-redirect routes back to the app after Link / bank
          # redirect payments complete in the external browser.
          stripe_filter = """
                  <intent-filter>
                      <action android:name="android.intent.action.VIEW" />
                      <category android:name="android.intent.category.DEFAULT" />
                      <category android:name="android.intent.category.BROWSABLE" />
                      <data android:scheme="me2leads" android:host="stripe-redirect" />
                  </intent-filter>"""
          if 'android:scheme="me2leads"' not in content:
              content = content.replace('</activity>', stripe_filter + '\n        </activity>', 1)

          with open(path, 'w') as f:
              f.write(content)
          print('AndroidManifest.xml patched')

          # Patch strings.xml app_name (covers @string/app_name reference)
          import os
          strings_path = 'android/app/src/main/res/values/strings.xml'
          if os.path.exists(strings_path):
              with open(strings_path, 'r') as f:
                  s = f.read()
              s = re.sub(r'<string name="app_name">[^<]*</string>', '<string name="app_name">Me2Leads</string>', s)
              with open(strings_path, 'w') as f:
                  f.write(s)
              print('strings.xml patched')
          PYEOF

      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Install sqflite web WASM into web/
        run: dart run sqflite_common_ffi_web:setup

      - name: Build Web
        run: flutter build web --release --base-href "/myleads-app/"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: me2leads-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Upload Web artifact
        uses: actions/upload-artifact@v4
        with:
          name: me2leads-web
          path: build/web/

  release:
    name: Create Release
    needs: build-android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: me2leads-release-apk
          path: ./release/

      - name: Delete existing release if any
        run: gh release delete v1.0.0 --yes --cleanup-tag 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0
          name: "Me2Leads v1.0.0 - Release"
          body: |
            ## Me2Leads v1.0.0

            **Scannez. Connectez. Convertissez.**

            Application mobile de gestion intelligente de contacts professionnels.

            ### Fonctionnalites
            - Scan carte de visite (OCR)
            - QR Code & NFC
            - Gestion contacts avec lead scoring (Hot/Warm/Cold)
            - Rappels et follow-up intelligent
            - Actions rapides : Appel, SMS, WhatsApp, Email
            - Mode offline
            - Forfaits Free (10 contacts) / Premium (2.99EUR/mois) / Business (5.99EUR/utilisateur/mois)

            ### Installation Android
            1. Telechargez `Me2Leads-v1.0.0.apk`
            2. Activez "Sources inconnues" dans Parametres > Securite
            3. Installez le fichier APK

            ---
            *Built by De Bouana*
          files: |
            ./release/app-release.apk
          draft: false
          prerelease: false

  deploy-web:
    name: Deploy Web to GitHub Pages
    needs: build-android
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download Web build
        uses: actions/download-artifact@v4
        with:
          name: me2leads-web
          path: ./web/

      - name: Setup Pages
        uses: actions/configure-pages@v4
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./web/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
